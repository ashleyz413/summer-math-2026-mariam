<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Summer Math — Progress Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #f5f0e8;
    --surface:   #fdfaf4;
    --surface2:  #f0ead8;
    --ink:       #1a1714;
    --ink2:      #5a5448;
    --ink3:      #9a9080;
    --border:    #ddd4bc;
    --border2:   #c8bc9e;

    --u1: #6b4fbb;   --u1l: #ede9fb;  --u1d: #3d2a7a;
    --u2: #1a8a5e;   --u2l: #d9f5eb;  --u2d: #0d5237;
    --u3: #b85c12;   --u3l: #fce8d5;  --u3d: #7a3a08;
    --u4: #c0382b;   --u4l: #fde8e6;  --u4d: #7d2218;
    --u5: #1a6ba8;   --u5l: #dceefb;  --u5d: #0d3f6e;
    --u6: #7a6b1f;   --u6l: #f7f0cc;  --u6d: #4a4010;
    --u7: #2a7a6b;   --u7l: #d5f5ee;  --u7d: #164a40;

    --green: #2a8a4e; --greenl: #d5f5e1; --greend: #1a5530;
    --amber: #c07010; --amberl: #fef3d0; --amberd: #7a4a08;
    --red:   #c03030; --redl:   #fde8e8; --redd:   #7a1818;

    --radius: 12px;
    --radius-sm: 8px;
    --shadow: 0 2px 8px rgba(60,40,10,.08), 0 1px 2px rgba(60,40,10,.06);
    --shadow-lg: 0 8px 32px rgba(60,40,10,.12), 0 2px 8px rgba(60,40,10,.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Nunito', sans-serif;
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ── Layout ── */
  .app { max-width: 900px; margin: 0 auto; padding: 0 20px 60px; }

  /* ── Header ── */
  .header {
    padding: 40px 0 28px;
    border-bottom: 2px solid var(--border);
    margin-bottom: 32px;
    display: flex;
    align-items: flex-end;
    gap: 24px;
    flex-wrap: wrap;
  }
  .header-text { flex: 1; min-width: 200px; }
  .header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 2.4rem;
    line-height: 1.1;
    color: var(--ink);
    margin-bottom: 6px;
  }
  .header h1 em {
    font-style: italic;
    color: var(--u1);
  }
  .header-sub {
    font-size: 13px;
    color: var(--ink3);
    font-family: 'DM Mono', monospace;
    letter-spacing: .02em;
  }
  .header-meta { display: flex; flex-direction: column; gap: 8px; align-items: flex-end; }

  /* ── Progress ring ── */
  .ring-wrap { position: relative; width: 88px; height: 88px; }
  .ring-wrap svg { transform: rotate(-90deg); }
  .ring-bg { fill: none; stroke: var(--border); stroke-width: 8; }
  .ring-fg { fill: none; stroke: var(--u1); stroke-width: 8; stroke-linecap: round; transition: stroke-dashoffset .6s ease; }
  .ring-label {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    line-height: 1.1;
  }
  .ring-pct { font-size: 19px; font-weight: 800; color: var(--ink); }
  .ring-txt { font-size: 10px; color: var(--ink3); font-family: 'DM Mono', monospace; }

  /* ── Stat pills ── */
  .stats-row {
    display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 28px;
  }
  .stat-pill {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 30px;
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    box-shadow: var(--shadow);
    flex-shrink: 0;
  }
  .stat-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .stat-num { font-size: 18px; font-weight: 800; }
  .stat-lbl { font-size: 11px; color: var(--ink2); font-weight: 600; text-transform: uppercase; letter-spacing: .06em; }

  /* ── Section label ── */
  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--ink3);
    letter-spacing: .1em;
    text-transform: uppercase;
    margin-bottom: 12px;
    padding-left: 2px;
  }

  /* ── Unit block ── */
  .unit { margin-bottom: 28px; }
  .unit-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
  }
  .unit-badge {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .08em;
    padding: 4px 12px;
    border-radius: 20px;
    flex-shrink: 0;
  }
  .unit-name {
    font-size: 15px;
    font-weight: 700;
    flex: 1;
  }
  .unit-prog-bar {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 10px;
  }
  .unit-prog-fill {
    height: 100%;
    border-radius: 2px;
    transition: width .4s ease;
  }
  .unit-dates {
    font-size: 11px;
    color: var(--ink3);
    font-family: 'DM Mono', monospace;
  }

  /* ── Day card ── */
  .days-list { display: flex; flex-direction: column; gap: 6px; }
  .day-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow);
    transition: box-shadow .15s;
  }
  .day-card:hover { box-shadow: var(--shadow-lg); }
  .day-card.done { opacity: .75; }
  .day-card.done .day-topic { text-decoration: line-through; text-decoration-color: var(--border2); }

  .day-top {
    display: flex; align-items: center; gap: 12px;
    padding: 13px 16px;
    cursor: pointer;
  }
  .day-check {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 2px solid var(--border2);
    background: transparent;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background .15s, border-color .15s;
  }
  .day-check:hover { border-color: var(--green); }
  .day-card.done .day-check {
    background: var(--green);
    border-color: var(--green);
  }
  .check-svg { display: none; }
  .day-card.done .check-svg { display: block; }

  .day-date-lbl {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--ink3);
    min-width: 72px;
    flex-shrink: 0;
  }
  .day-topic {
    font-size: 14px;
    font-weight: 700;
    flex: 1;
    min-width: 0;
  }
  .day-mod {
    font-size: 11px;
    color: var(--ink3);
    font-family: 'DM Mono', monospace;
    flex-shrink: 0;
    display: none;
  }
  @media(min-width:580px){ .day-mod { display: block; } }

  .day-score-wrap {
    display: flex; align-items: center; gap: 6px;
    flex-shrink: 0;
  }
  .score-badge {
    font-size: 11px;
    font-weight: 700;
    padding: 2px 9px;
    border-radius: 20px;
    font-family: 'DM Mono', monospace;
    cursor: pointer;
    border: 1px solid transparent;
    transition: background .12s;
  }
  .score-badge.strong  { background: var(--greenl); color: var(--greend); border-color: var(--green); }
  .score-badge.ok      { background: var(--amberl); color: var(--amberd); border-color: var(--amber); }
  .score-badge.shaky   { background: var(--redl);   color: var(--redd);   border-color: var(--red); }
  .score-badge.none    { background: var(--surface2); color: var(--ink3); border-color: var(--border); }

  .day-chevron {
    font-size: 13px; color: var(--ink3);
    transition: transform .2s;
    flex-shrink: 0;
    user-select: none;
  }
  .day-card.open .day-chevron { transform: rotate(180deg); }

  .day-detail {
    display: none;
    padding: 0 16px 14px 16px;
    border-top: 1px solid var(--border);
  }
  .day-card.open .day-detail { display: block; }
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 12px; }
  @media(max-width:560px){ .detail-grid { grid-template-columns: 1fr; } }

  .detail-item { display: flex; gap: 10px; align-items: flex-start; }
  .detail-icon {
    width: 28px; height: 28px;
    border-radius: 8px;
    background: var(--surface2);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .detail-body {}
  .detail-lbl {
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: .07em; color: var(--ink3); margin-bottom: 1px;
  }
  .detail-val {
    font-size: 13px; color: var(--ink2); line-height: 1.5;
  }
  .detail-val a {
    color: var(--u1);
    text-decoration: none;
    font-weight: 600;
  }
  .detail-val a:hover { text-decoration: underline; }

  .score-row {
    margin-top: 12px;
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  }
  .score-row-lbl { font-size: 12px; font-weight: 700; color: var(--ink2); }
  .score-btns { display: flex; gap: 6px; }
  .score-btn {
    font-size: 11px; font-weight: 700; font-family: 'Nunito', sans-serif;
    padding: 5px 14px; border-radius: 20px; border: 2px solid;
    cursor: pointer; transition: background .12s, color .12s;
    background: transparent;
  }
  .score-btn.strong  { border-color: var(--green);  color: var(--greend); }
  .score-btn.ok      { border-color: var(--amber); color: var(--amberd); }
  .score-btn.shaky   { border-color: var(--red);   color: var(--redd); }
  .score-btn.strong:hover, .score-btn.strong.active  { background: var(--greenl); }
  .score-btn.ok:hover,     .score-btn.ok.active      { background: var(--amberl); }
  .score-btn.shaky:hover,  .score-btn.shaky.active   { background: var(--redl); }

  .notes-wrap { margin-top: 10px; }
  .notes-lbl { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--ink3); margin-bottom: 4px; }
  .notes-input {
    width: 100%; font-family: 'Nunito', sans-serif; font-size: 13px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 8px 10px;
    color: var(--ink); resize: vertical; min-height: 56px;
    transition: border-color .15s;
  }
  .notes-input:focus { outline: none; border-color: var(--u1); }
  .notes-input::placeholder { color: var(--ink3); }

  /* ── Break strip ── */
  .break-strip {
    background: var(--surface2);
    border: 1px dashed var(--border2);
    border-radius: var(--radius-sm);
    padding: 9px 16px;
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    color: var(--ink3);
    text-align: center;
    margin-bottom: 28px;
    letter-spacing: .04em;
  }

  /* ── Weak spots panel ── */
  .weak-panel {
    background: var(--redl);
    border: 1px solid var(--red);
    border-radius: var(--radius);
    padding: 16px 20px;
    margin-bottom: 28px;
  }
  .weak-panel h3 {
    font-size: 13px; font-weight: 700;
    text-transform: uppercase; letter-spacing: .07em;
    color: var(--redd); margin-bottom: 10px;
  }
  .weak-list { display: flex; flex-wrap: wrap; gap: 6px; }
  .weak-tag {
    font-size: 12px; font-weight: 600;
    background: white; border: 1px solid var(--red);
    color: var(--redd); padding: 3px 11px; border-radius: 20px;
  }
  .weak-empty { font-size: 13px; color: var(--redd); opacity: .7; }

  /* ── Footer ── */
  .footer {
    border-top: 1px solid var(--border);
    padding-top: 20px;
    margin-top: 40px;
    display: flex; gap: 12px; align-items: center;
    flex-wrap: wrap;
  }
  .footer-info { font-size: 12px; color: var(--ink3); flex: 1; }
  .reset-btn {
    font-size: 12px; font-weight: 700; font-family: 'Nunito', sans-serif;
    padding: 7px 16px; border-radius: 20px;
    border: 1px solid var(--border2); background: transparent;
    color: var(--ink3); cursor: pointer; transition: background .12s;
  }
  .reset-btn:hover { background: var(--surface2); }

  /* ── Scroll-reveal ── */
  .unit { opacity: 0; transform: translateY(14px); transition: opacity .35s ease, transform .35s ease; }
  .unit.visible { opacity: 1; transform: none; }
</style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <div class="header">
    <div class="header-text">
      <h1>Summer Math<br><em>Progress Tracker</em></h1>
      <div class="header-sub">26 days · Jun 8 – Jul 22 · 6th grade accelerated</div>
    </div>
    <div class="header-meta">
      <div class="ring-wrap" aria-label="Overall completion">
        <svg width="88" height="88" viewBox="0 0 88 88">
          <circle class="ring-bg" cx="44" cy="44" r="36"/>
          <circle class="ring-fg" id="ring-fg" cx="44" cy="44" r="36"
            stroke-dasharray="226.2"
            stroke-dashoffset="226.2"/>
        </svg>
        <div class="ring-label">
          <div class="ring-pct" id="ring-pct">0%</div>
          <div class="ring-txt">done</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Stat pills -->
  <div class="stats-row" id="stats-row">
    <div class="stat-pill">
      <div class="stat-dot" style="background:var(--green)"></div>
      <div class="stat-num" id="stat-done">0</div>
      <div class="stat-lbl">Days done</div>
    </div>
    <div class="stat-pill">
      <div class="stat-dot" style="background:var(--border2)"></div>
      <div class="stat-num" id="stat-left">26</div>
      <div class="stat-lbl">Remaining</div>
    </div>
    <div class="stat-pill">
      <div class="stat-dot" style="background:var(--green)"></div>
      <div class="stat-num" id="stat-strong">0</div>
      <div class="stat-lbl">Strong</div>
    </div>
    <div class="stat-pill">
      <div class="stat-dot" style="background:var(--amber)"></div>
      <div class="stat-num" id="stat-ok">0</div>
      <div class="stat-lbl">Getting there</div>
    </div>
    <div class="stat-pill">
      <div class="stat-dot" style="background:var(--red)"></div>
      <div class="stat-num" id="stat-shaky">0</div>
      <div class="stat-lbl">Needs review</div>
    </div>
  </div>

  <!-- Weak spots -->
  <div class="weak-panel" id="weak-panel" style="display:none">
    <h3>⚑ Topics to revisit</h3>
    <div class="weak-list" id="weak-list"></div>
  </div>

  <!-- Curriculum -->
  <div id="curriculum-root"></div>

  <!-- Footer -->
  <div class="footer">
    <div class="footer-info">Progress is saved automatically in your browser. Open on any device that has visited this page.</div>
    <button class="reset-btn" onclick="confirmReset()">Reset all progress</button>
  </div>

</div>

<script>
const UNITS = [
  {
    id: 'u1', color: '--u1', light: '--u1l', dark: '--u1d',
    label: 'Unit 1', name: 'Numbers & Integers',

    days: [
      { id:'d01', date:'Mon Jun 8',  topic:'Integers, opposites & number lines',       mod:'Mod 1.1–1.2', book:'Module 1, Lessons 1.1–1.2 (pp. 3–16)',        khan:'Negative numbers intro', kurl:'https://www.khanacademy.org/math/cc-sixth-grade-math/cc-6th-negative-number-topic', time:'20 min book + 20 min Khan' },
      { id:'d02', date:'Tue Jun 9',  topic:'Absolute value',                            mod:'Mod 1.3',     book:'Module 1, Lesson 1.3 (pp. 17–24)',               khan:'Absolute value',          kurl:'https://www.khanacademy.org/math/cc-sixth-grade-math/cc-6th-negative-number-topic/cc-6th-absolute-value/e/absolute_value', time:'15 min book + 25 min Khan' },
      { id:'d03', date:'Wed Jun 10', topic:'Greatest common factor (GCF)',              mod:'Mod 2.1',     book:'Module 2, Lesson 2.1 (pp. 31–38)',               khan:'Greatest common factor',  kurl:'https://www.khanacademy.org/math/cc-sixth-grade-math/cc-6th-factors-and-multiples/cc-6th-gcf/e/greatest_common_divisor', time:'20 min book + 20 min Khan' },
      { id:'d04', date:'Thu Jun 11', topic:'Least common multiple (LCM)',               mod:'Mod 2.2',     book:'Module 2, Lesson 2.2 (pp. 39–46)',               khan:'Least common multiple',   kurl:'https://www.khanacademy.org/math/cc-sixth-grade-math/cc-6th-factors-and-multiples/cc-6th-lcm/e/least_common_multiple', time:'20 min book + 20 min Khan' },
      { id:'d05', date:'Fri Jun 12', topic:'Classifying & ordering rational numbers',   mod:'Mod 3.1–3.3', book:'Module 3, Lessons 3.1–3.3 (pp. 53–76)',         khan:'Ordering rational numbers',kurl:'https://www.khanacademy.org/math/cc-sixth-grade-math/cc-6th-negative-number-topic/cc-6th-order-rational-numbers/e/ordering_negative_numbers', time:'20 min book + 25 min Khan' },

  {

      { id:'d10', date:'Fri Jun 19', topic:'Dividing decimals & applying rational numbers',     mod:'Mod 5.4–5.5', book:'Module 5, Lessons 5.4–5.5 (pp. 149–164)',  khan:'Dividing decimals',           kurl:'https://www.khanacademy.org/math/cc-sixth-grade-math/cc-6th-arithmetic-operations/cc-6th-dividing-decimals/e/dividing_decimals_2', time:'20 min book + 25 min Khan' },

  },
  {
    id: 'u3', color: '--u3', light: '--u3l', dark: '--u3d',
    label: 'Unit 3', name: 'Ratios, Rates & Percents',
    dates: 'Jun 25–29, Jul 8–9',
    days: [
      { id:'d11', date:'Wed Jun 25', topic:'Understanding ratios & rates',         mod:'Mod 6.1–6.2', book:'Module 6, Lessons 6.1–6.2 (pp. 177–192)', khan:'Ratios and rates',             kurl:'https://www.khanacademy.org/math/cc-sixth-grade-math/cc-6th-ratios-prop-topic/cc-6th-rates/e/rate-problems', time:'20 min book + 20 min Khan' },
      { id:'d12', date:'Thu Jun 26', topic:'Using ratios & rates to solve problems', mod:'Mod 6.3',   book:'Module 6, Lesson 6.3 (pp. 193–200)',        khan:'Ratio word problems',         kurl:'https://www.khanacademy.org/math/cc-sixth-grade-math/cc-6th-ratios-prop-topic/cc-6th-ratio-word-problems/e/ratio_word_problems', time:'15 min book + 30 min Khan' },
      { id:'d13', date:'Fri Jun 27', topic:'Proportions, tables & graphs',         mod:'Mod 7.1–7.2', book:'Module 7, Lessons 7.1–7.2 (pp. 207–222)', khan:'Solving proportions',         kurl:'https://www.khanacademy.org/math/cc-sixth-grade-math/cc-6th-ratios-prop-topic/cc-6th-proportions/e/proportions_1', time:'20 min book + 25 min Khan' },
      { id:'d14', date:'Sun Jun 29', topic:'Unit conversions (within & between systems)', mod:'Mod 7.3–7.4', book:'Module 7, Lessons 7.3–7.4 (pp. 223–238)', khan:'Unit conversion word problems', kurl:'https://www.khanacademy.org/math/cc-sixth-grade-math/cc-6th-ratios-prop-topic/cc-6th-unit-conversion/e/unit_conversion', time:'20 min book + 25 min Khan' },
      { id:'d15', date:'Tue Jul 8',  topic:'Percents — meaning, fractions & decimals', mod:'Mod 8.1–8.2', book:'Module 8, Lessons 8.1–8.2 (pp. 245–260)', khan:'Percents intro',              kurl:'https://www.khanacademy.org/math/cc-sixth-grade-math/cc-6th-ratios-prop-topic/cc-6th-percent/e/expressing-decimals-as-percents', time:'20 min book + 20 min Khan' },
      { id:'d16', date:'Wed Jul 9',  topic:'Solving percent problems',             mod:'Mod 8.3',     book:'Module 8, Lesson 8.3 (pp. 261–268)',        khan:'Percent word problems',       kurl:'https://www.khanacademy.org/math/cc-sixth-grade-math/cc-6th-ratios-prop-topic/cc-6th-percent-word-problems/e/percent_word_problems', time:'15 min book + 30 min Khan' },
    ]
  },
  {

    days: [
      { id:'d17', date:'Thu Jul 10', topic:'Exponents & prime factorization',          mod:'Mod 9.1–9.2',  book:'Module 9, Lessons 9.1–9.2 (pp. 281–296)',  khan:'Exponents',                    kurl:'https://www.khanacademy.org/math/cc-sixth-grade-math/cc-6th-expressions-and-variables/cc-6th-exponents/e/positive-and-zero-exponents', time:'20 min book + 25 min Khan' },
      { id:'d18', date:'Mon Jul 13', topic:'Order of operations',                      mod:'Mod 9.3',      book:'Module 9, Lesson 9.3 (pp. 297–304)',        khan:'Order of operations',          kurl:'https://www.khanacademy.org/math/cc-sixth-grade-math/cc-6th-expressions-and-variables/cc-6th-order-of-operations/e/order_of_operations', time:'20 min book + 25 min Khan' },
      { id:'d19', date:'Tue Jul 14', topic:'Writing & evaluating algebraic expressions', mod:'Mod 10.1–10.2', book:'Module 10, Lessons 10.1–10.2 (pp. 311–326)', khan:'Writing & evaluating expressions', kurl:'https://www.khanacademy.org/math/cc-sixth-grade-math/cc-6th-expressions-and-variables/cc-6th-evaluating-expressions/e/evaluating_expressions_1', time:'20 min book + 25 min Khan' },
      { id:'d20', date:'Wed Jul 15', topic:'Generating equivalent expressions',        mod:'Mod 10.3',     book:'Module 10, Lesson 10.3 (pp. 327–334)',      khan:'Combining like terms',         kurl:'https://www.khanacademy.org/math/cc-sixth-grade-math/cc-6th-expressions-and-variables/cc-6th-combining-like-terms/e/combining_like_terms_1', time:'15 min book + 30 min Khan' },

    days: [
      { id:'d21', date:'Thu Jul 16', topic:'Writing & solving equations (one-step)',         mod:'Mod 11.1–11.3', book:'Module 11, Lessons 11.1–11.3 (pp. 341–368)', khan:'One-step equations',       kurl:'https://www.khanacademy.org/math/cc-sixth-grade-math/cc-6th-equations-and-inequalities/cc-6th-one-step-add-sub-equations/e/one_step_equations', time:'20 min book + 25 min Khan' },
      { id:'d22', date:'Fri Jul 17', topic:'Inequalities & graphing two-variable relationships', mod:'Mod 11.4 + 12', book:'Module 11, Lesson 11.4 + Module 12, all (pp. 369–404)', khan:'Inequalities & coordinate plane', kurl:'https://www.khanacademy.org/math/cc-sixth-grade-math/cc-6th-equations-and-inequalities', time:'20 min book + 25 min Khan' },

      { id:'d23', date:'Sun Jul 20', topic:'Area of polygons, surface area & volume',  mod:'Mod 13–15',    book:'Modules 13–15, selected lessons (pp. 413–476)', khan:'Area and volume',           kurl:'https://www.khanacademy.org/math/cc-sixth-grade-math/cc-6th-geometry-topic', time:'25 min book + 30 min Khan' },
      { id:'d24', date:'Mon Jul 21', topic:'Distance & area in the coordinate plane + data intro', mod:'Mod 14 + 16.1', book:'Module 14 + Module 16, Lesson 16.1 (pp. 459–496)', khan:'Statistics — measures of center', kurl:'https://www.khanacademy.org/math/cc-sixth-grade-math/cc-6th-data-statistics', time:'20 min book + 25 min Khan' },

    id: 'u7', color: '--u7', light: '--u7l', dark: '--u7d',
    label: 'Unit 7', name: 'Data & Statistics + Final Review',
    dates: 'Jul 21–22',
    days: [
      { id:'d25', date:'Mon Jul 21', topic:'Box plots, dot plots, histograms & MAD',   mod:'Mod 16.2–16.5', book:'Module 16, Lessons 16.2–16.5 (pp. 497–520)', khan:'Data displays & distributions', kurl:'https://www.khanacademy.org/math/cc-sixth-grade-math/cc-6th-data-statistics', time:'20 min book + 25 min Khan' },
      { id:'d26', date:'Tue Jul 22', topic:'Final review + Khan Academy Course Challenge', mod:'All units',  book:'Personal review of weak spots in all modules',  khan:'6th Grade Course Challenge', kurl:'https://www.khanacademy.org/math/cc-sixth-grade-math/cc-sixth-grade-math-test/cc-6th-grade-math-course-challenge/test/cc-6th-grade-math-course-challenge', time:'30 min review + 40 min Course Challenge' },
    ]

const BREAKS = {
  'u3': { before: true, text: '— Break: Jun 20–24 · No sessions —' },
  'u4': { before: true, text: '— Break: Jun 30 – Jul 7 · No sessions —' }
};

// ── State ──
const KEY = 'math_summer_2025';
let state = {};

function loadState() {
  try { state = JSON.parse(localStorage.getItem(KEY)) || {}; } catch { state = {}; }
}
function saveState() {
  localStorage.setItem(KEY, JSON.stringify(state));
}
function getDay(id) {
  return state[id] || { done: false, score: null, notes: '' };
}
function setDayDone(id, val) {
  if (!state[id]) state[id] = { done: false, score: null, notes: '' };
  state[id].done = val;
  saveState(); render();
}
function setScore(id, val) {
  if (!state[id]) state[id] = { done: false, score: null, notes: '' };
  state[id].score = val;
  saveState(); render();
}
function setNotes(id, val) {
  if (!state[id]) state[id] = { done: false, score: null, notes: '' };
  state[id].notes = val;
  saveState();
}

// ── Render ──
function scoreLabel(s) {
  if (s === 'strong') return '✓ Strong';
  if (s === 'ok')     return '~ OK';
  if (s === 'shaky')  return '⚑ Shaky';
  return 'Rate';
}

function render() {
  const root = document.getElementById('curriculum-root');
  let html = '';

  UNITS.forEach(unit => {
    const br = BREAKS[unit.id];
    if (br && br.before) {
      html += `<div class="break-strip">${br.text}</div>`;
    }

    const total = unit.days.length;
    const done  = unit.days.filter(d => getDay(d.id).done).length;
    const pct   = total ? Math.round(done / total * 100) : 0;
    const col   = `var(${unit.color})`;
    const colL  = `var(${unit.light})`;

    html += `<div class="unit" id="unit-${unit.id}">
      <div class="unit-header">
        <span class="unit-badge" style="background:${colL};color:${col}">${unit.label}</span>
        <span class="unit-name">${unit.name}</span>
        <span class="unit-dates">${unit.dates}</span>
      </div>
      <div class="unit-prog-bar">
        <div class="unit-prog-fill" style="width:${pct}%;background:${col}"></div>
      </div>
      <div class="days-list">`;

    unit.days.forEach(day => {
      const ds = getDay(day.id);
      const open = state[day.id + '_open'] ? 'open' : '';
      const done = ds.done ? 'done' : '';
      const sc   = ds.score || 'none';
      html += `<div class="day-card ${done} ${open}" id="card-${day.id}">
        <div class="day-top" onclick="toggleCard('${day.id}')">
          <div class="day-check" onclick="event.stopPropagation();toggleDone('${day.id}')">
            <svg class="check-svg" width="12" height="12" viewBox="0 0 12 12" fill="none">
              <polyline points="2,6 5,9 10,3" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <span class="day-date-lbl">${day.date}</span>
          <span class="day-topic">${day.topic}</span>
          <span class="day-mod">${day.mod}</span>
          <div class="day-score-wrap">
            <span class="score-badge ${sc}">${scoreLabel(ds.score)}</span>
          </div>
          <span class="day-chevron">▾</span>
        </div>
        <div class="day-detail">
          <div class="detail-grid">
            <div class="detail-item">
              <div class="detail-icon">📖</div>
              <div class="detail-body">
                <div class="detail-lbl">Book</div>
                <div class="detail-val">${day.book}</div>
              </div>
            </div>
            <div class="detail-item">
              <div class="detail-icon">🎯</div>
              <div class="detail-body">
                <div class="detail-lbl">Khan Academy</div>
                <div class="detail-val"><a href="${day.kurl}" target="_blank" rel="noopener">${day.khan} ↗</a></div>
              </div>
            </div>
            <div class="detail-item">
              <div class="detail-icon">⏱</div>
              <div class="detail-body">
                <div class="detail-lbl">Time split</div>
                <div class="detail-val">${day.time}</div>
              </div>
            </div>
          </div>
          <div class="score-row">
            <span class="score-row-lbl">How did it go?</span>
            <div class="score-btns">
              <button class="score-btn strong ${ds.score==='strong'?'active':''}" onclick="setScore('${day.id}','strong')">✓ Strong</button>
              <button class="score-btn ok ${ds.score==='ok'?'active':''}" onclick="setScore('${day.id}','ok')">~ Getting there</button>
              <button class="score-btn shaky ${ds.score==='shaky'?'active':''}" onclick="setScore('${day.id}','shaky')">⚑ Needs review</button>
            </div>
          </div>
          <div class="notes-wrap">
            <div class="notes-lbl">Notes</div>
            <textarea class="notes-input" rows="2" placeholder="What was tricky? What clicked? Any questions?" onchange="setNotes('${day.id}',this.value)">${ds.notes||''}</textarea>
          </div>
        </div>
      </div>`;
    });

    html += `</div></div>`;
  });

  root.innerHTML = html;
  updateStats();
  revealUnits();
}

function toggleCard(id) {
  const key = id + '_open';
  state[key] = !state[key];
  const card = document.getElementById('card-' + id);
  if (card) card.classList.toggle('open', !!state[key]);
}

function toggleDone(id) {
  const ds = getDay(id);
  setDayDone(id, !ds.done);
}

function updateStats() {
  const allDays = UNITS.flatMap(u => u.days);
  const total   = allDays.length;
  let done = 0, strong = 0, ok = 0, shaky = 0;
  const weakList = [];

  allDays.forEach(d => {
    const ds = getDay(d.id);
    if (ds.done) done++;
    if (ds.score === 'strong') strong++;
    if (ds.score === 'ok') ok++;
    if (ds.score === 'shaky') { shaky++; weakList.push(d.topic); }
  });

  const pct = Math.round(done / total * 100);
  const circ = 226.2;
  const offset = circ - (circ * pct / 100);

  document.getElementById('ring-pct').textContent = pct + '%';
  const rf = document.getElementById('ring-fg');
  if (rf) rf.setAttribute('stroke-dashoffset', offset);

  document.getElementById('stat-done').textContent  = done;
  document.getElementById('stat-left').textContent  = total - done;
  document.getElementById('stat-strong').textContent = strong;
  document.getElementById('stat-ok').textContent    = ok;
  document.getElementById('stat-shaky').textContent = shaky;

  const wp = document.getElementById('weak-panel');
  const wl = document.getElementById('weak-list');
  if (shaky > 0) {
    wp.style.display = 'block';
    wl.innerHTML = weakList.map(t => `<span class="weak-tag">${t}</span>`).join('');
  } else {
    wp.style.display = 'none';
  }
}

function revealUnits() {
  const els = document.querySelectorAll('.unit');
  const observer = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); }
    });
  }, { threshold: 0.05 });
  els.forEach((el, i) => {
    el.style.transitionDelay = (i * 40) + 'ms';
    observer.observe(el);
  });
}

function confirmReset() {
  if (confirm('Reset all progress? This cannot be undone.')) {
    localStorage.removeItem(KEY);
    state = {};
    render();
  }
}

// ── Init ──
loadState();
render();
</script>
